<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanteenPay - Digital Receipt</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .receipt-container {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .receipt-container::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background-size: 20px 20px;
            background-image: radial-gradient(circle at 10px 0, transparent 10px, white 11px);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #2563eb; font-size: 28px; }
        .header p { margin: 5px 0 0 0; color: #64748b; font-size: 14px; }

        /* --- TOKEN BOX STYLES --- */
        .token-container {
            text-align: center;
            background: #eff6ff;
            border: 2px dashed #3b82f6;
            border-radius: 12px;
            padding: 15px;
            margin: 0 0 20px 0;
        }
        .token-label {
            font-size: 12px;
            color: #3b82f6;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .token-number {
            font-size: 42px;
            font-weight: 900;
            color: #1d4ed8;
            margin-top: 5px;
            line-height: 1;
        }
        /* ---------------------------- */
        
        .divider {
            border-top: 2px dashed #e2e8f0;
            margin: 20px 0;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .label { color: #64748b; font-weight: 500; }
        .value { font-weight: 700; color: #0f172a; text-align: right; }
        
        .items-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .total-label { font-size: 20px; font-weight: 800; }
        .total-amount { font-size: 28px; font-weight: 900; color: #10b981; }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            font-size: 13px;
        }

        .btn-download {
            display: block; 
            width: 80%; 
            background: #2563eb;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin: 25px auto 0; 
            transition: background 0.2s;
        }
        .btn-download:hover { background: #1d4ed8; }

        #receipt-card { display: none; }
        #loading-state { text-align: center; color: #64748b; font-size: 16px; padding: 40px 0; }
    </style>
</head>
<body>

    <div id="loading-state">
        <h2 id="status-msg">Generating your receipt... ⏳</h2>
    </div>

    <div id="receipt-card" class="receipt-container">
        <div class="header">
            <h1>CanteenPay</h1>
            <p>Official Digital Receipt</p>
        </div>

        <div class="token-container">
            <div class="token-label">Token Number</div>
            <div class="token-number" id="r-token">--</div>
        </div>

        <div class="row">
            <span class="label">Order Number:</span>
            <span class="value" id="r-order">#--</span>
        </div>
        <div class="row">
            <span class="label">Date & Time:</span>
            <span class="value" id="r-time">--</span>
        </div>

        <div class="divider"></div>

        <div class="items-box">
            <div class="label" style="margin-bottom: 8px;">Items Purchased:</div>
            <div class="value" id="r-info" style="text-align: left; font-size: 16px;">--</div>
        </div>

        <div class="divider"></div>

        <div class="total-row">
            <span class="total-label">Total Paid:</span>
            <span class="total-amount" id="r-amount">₹0</span>
        </div>

        <a href="#" class="btn-download" onclick="window.print()">📥 Save / Print PDF</a>

        <div class="footer">
            <p>Thank you for your purchase!</p>
            <p>Powered by CanteenPay System</p>
        </div>
    </div>

    <script>
        function loadDigitalReceipt() {
            // Grab the data passed from the ESP32 via the URL
            const urlParams = new URLSearchParams(window.location.search);
            const targetOrderNo = urlParams.get('order');
            const amount = urlParams.get('amt');
            let items = urlParams.get('items');

            // If the URL is missing data, show an error
            if (!targetOrderNo || !amount || !items) {
                document.getElementById('status-msg').innerHTML = "Invalid QR Code.<br><br>No order details found.";
                return;
            }

            // --- THE TOKEN MAGIC ---
            // Take the last 3 digits of the timestamp-based Order ID to use as a token number
            const tokenNumber = targetOrderNo.slice(-3);

            // Clean up the items text (replace underscores with spaces, plus signs with line breaks)
            const formattedItems = items.replace(/_/g, " ").replace(/\+/g, "<br>");

            // Format current date and time
            const now = new Date();
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true };
            const formattedTime = now.toLocaleString('en-US', options);

            // Inject it into the HTML
            document.getElementById('r-token').innerText = tokenNumber; 
            document.getElementById('r-order').innerText = '#' + targetOrderNo;
            document.getElementById('r-time').innerText = formattedTime;
            document.getElementById('r-info').innerHTML = formattedItems;
            document.getElementById('r-amount').innerText = '₹' + amount;

            // Hide the loading screen and show the beautiful receipt
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('receipt-card').style.display = 'block';
        }

        // Run the function immediately when the page loads
        loadDigitalReceipt();
    </script>
</body>
</html>
